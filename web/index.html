<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cpu_flow_simulator">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>cpu_flow_simulator</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: linear-gradient(160deg, #fff8f1 0%, #fee9d7 100%);
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #5a3724;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
      background: linear-gradient(160deg, #fff8f1 0%, #fee9d7 100%);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #loading-screen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.34), transparent 60%);
      pointer-events: none;
    }

    #loading-card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 28px 34px;
      border-radius: 20px;
      background: rgba(255, 249, 243, 0.88);
      box-shadow: 0 18px 40px rgba(30, 14, 0, 0.12);
      border: 1px solid rgba(232, 215, 200, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .loading-spinner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 5px solid rgba(198, 106, 43, 0.18);
      border-top-color: #c66a2b;
      animation: spin 0.9s linear infinite;
    }

    .loading-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .loading-subtitle {
      margin: 0;
      font-size: 13px;
      color: #80563c;
    }

    .flutter-ready #loading-screen {
      opacity: 0;
      transform: scale(0.98);
      pointer-events: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loading-screen" role="status" aria-live="polite" aria-label="Cargando la aplicación">
    <div id="loading-card">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-title">Cargando simulador</p>
      <p class="loading-subtitle">Preparando la interfaz...</p>
    </div>
  </div>
  <script>
    (function () {
      let loadingScreenHidden = false;

      function hideLoadingScreen() {
        if (loadingScreenHidden) {
          return;
        }

        loadingScreenHidden = true;
        document.documentElement.classList.add('flutter-ready');
        window.setTimeout(function () {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.remove();
          }
        }, 220);
      }

      function hasFlutterContent() {
        return Boolean(
          document.querySelector('flt-glass-pane') ||
          document.querySelector('flutter-view') ||
          document.querySelector('flt-scene-host')
        );
      }

      function waitForFlutterContent() {
        if (hasFlutterContent()) {
          requestAnimationFrame(function () {
            requestAnimationFrame(hideLoadingScreen);
          });
          return;
        }

        requestAnimationFrame(waitForFlutterContent);
      }

      window.addEventListener('load', waitForFlutterContent);
      window.setTimeout(hideLoadingScreen, 30000);
    })();

    (function () {
      const loaderColors = {
        track: '#f6dcc7',
        primary: '#c66a2b',
        secondary: '#a84e17',
      };

      const recolorBootstrapLoader = (styleElement) => {
        if (!styleElement || !styleElement.textContent || !styleElement.textContent.includes('.flutter-loader')) {
          return;
        }

        styleElement.textContent = styleElement.textContent
          .replace(/#13B9FD/g, loaderColors.track)
          .replace(/#0175C2/g, loaderColors.primary)
          .replace(/#02569B/g, loaderColors.secondary);
      };

      const observer = new MutationObserver((mutations) => {
        for (const mutation of mutations) {
          for (const node of mutation.addedNodes) {
            if (node && node.tagName === 'STYLE') {
              recolorBootstrapLoader(node);
            }
          }
        }
      });

      observer.observe(document.head, { childList: true });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
